<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #070A12;
      --panel: #09101B;
      --panel-stroke: #1A2336;
      --field-glow-a: #0E5A57;
      --field-glow-b: #0A2230;

      --orbit-a: #243249;
      --orbit-b: #3D478A;
      --orbit-c: #17D7B4;

      --star-fill: #1FC8B3;
      --star-stroke: #EEF3FB;
      --star-core: #F3F7FD;

      --wordmark: #F3F6FC;
      --submark: #1BD9B8;
      --copy: #93A0B8;
      --rule-mid: #2C6570;
      --rule-end: #4651A0;
      --satellite: #D8FFF7;
    }
  </style>

  <rect width="1400" height="420" rx="36" fill="var(--bg)"/>

  <defs>
    <linearGradient id="orbitPremium" x1="34" y1="70" x2="286" y2="234" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--orbit-a)" stop-opacity="0.34"/>
      <stop offset="0.34" stop-color="var(--orbit-b)" stop-opacity="0.82"/>
      <stop offset="1" stop-color="var(--orbit-c)" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="fieldGlowPremium" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 150) rotate(90) scale(110)">
      <stop stop-color="var(--field-glow-a)" stop-opacity="0.18"/>
      <stop offset="0.72" stop-color="var(--field-glow-b)" stop-opacity="0.05"/>
      <stop offset="1" stop-color="var(--field-glow-b)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rulePremium" x1="4" y1="214" x2="454" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--submark)"/>
      <stop offset="0.58" stop-color="var(--rule-mid)"/>
      <stop offset="1" stop-color="var(--rule-end)" stop-opacity="0.28"/>
    </linearGradient>
  </defs>

  <g transform="translate(172 56)">
    <circle cx="160" cy="150" r="126" fill="var(--panel)" stroke="var(--panel-stroke)" stroke-width="2"/>
    <circle cx="160" cy="150" r="108" fill="url(#fieldGlowPremium)"/>

    <g transform="rotate(-27 160 150)">
      <ellipse cx="160" cy="150" rx="128" ry="74" stroke="url(#orbitPremium)" stroke-width="8.5" opacity="0.98"/>
      <circle cx="286" cy="150" r="8.5" fill="var(--satellite)"/>
    </g>

    <path
      d="M160 78L170.5 139.5L232 150L170.5 160.5L160 222L149.5 160.5L88 150L149.5 139.5L160 78Z"
      fill="var(--star-fill)"
      stroke="var(--star-stroke)"
      stroke-width="1.8"
      stroke-linejoin="round"
    />
    <circle cx="160" cy="150" r="5" fill="var(--star-core)"/>
  </g>

  <g transform="translate(560 104)">
    <text x="0" y="116" fill="var(--wordmark)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="128" font-weight="800" letter-spacing="-4">ASTRA</text>
    <text x="6" y="184" fill="var(--submark)" font-family="JetBrains Mono, Consolas, monospace" font-size="34" font-weight="700" letter-spacing="12">TRADEBOT</text>
    <line x1="4" y1="214" x2="454" y2="214" stroke="url(#rulePremium)" stroke-width="2" opacity="0.72"/>
  </g>
</svg>
