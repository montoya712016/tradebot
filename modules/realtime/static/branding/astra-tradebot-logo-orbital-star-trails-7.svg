<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #070A12;
      --field-fill: #09101C;
      --field-stroke: #1A2336;
      --field-glow-a: #0E6A63;
      --field-glow-b: #0A2834;

      --orbit-0: #1F2B42;
      --orbit-1: #2D355F;
      --orbit-2: #5D46C9;
      --orbit-3: #2B7E86;
      --orbit-4: #17D9B6;

      --trail-a: #29354F;
      --trail-b: #455C9F;
      --trail-c: #18DDB8;

      --star-fill: #1FBFAD;
      --star-stroke: #EEF3FB;
      --star-center: #EEF3FB;

      --satellite: #D7FFF8;
      --wordmark: #F2F5FA;
      --submark: #17D9B6;
      --copy: #94A3B8;
      --line-mid: #2E6D7E;
      --line-end: #5D46C9;
    }
  </style>

  <rect width="1400" height="420" rx="36" fill="var(--bg)"/>

  <defs>
    <linearGradient id="orbitFlowTrail" x1="16" y1="60" x2="304" y2="242" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--trail-a)" stop-opacity="0.24"/>
      <stop offset="0.44" stop-color="var(--trail-b)" stop-opacity="0.5"/>
      <stop offset="1" stop-color="var(--trail-c)" stop-opacity="0.74"/>
    </linearGradient>
    <radialGradient id="fieldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 150) rotate(90) scale(112)">
      <stop stop-color="var(--field-glow-a)" stop-opacity="0.24"/>
      <stop offset="0.7" stop-color="var(--field-glow-b)" stop-opacity="0.08"/>
      <stop offset="1" stop-color="var(--field-glow-b)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordLine" x1="4" y1="214" x2="454" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--submark)"/>
      <stop offset="0.58" stop-color="var(--line-mid)"/>
      <stop offset="1" stop-color="var(--line-end)" stop-opacity="0.28"/>
    </linearGradient>
    <clipPath id="starTopTipClip">
      <path d="M160 56L188 140L160 184L132 140L160 56Z"/>
    </clipPath>
  </defs>

  <g transform="translate(190 56)">
    <circle cx="160" cy="150" r="126" fill="var(--field-fill)" stroke="var(--field-stroke)" stroke-width="2"/>
    <circle cx="160" cy="150" r="110" fill="url(#fieldGlow)"/>

    <path d="M160 60L178 138L256 150L178 162L160 240L142 162L64 150L142 138L160 60Z" fill="var(--star-fill)" stroke="var(--star-stroke)" stroke-width="2.2"/>
    <circle cx="160" cy="150" r="7" fill="var(--star-center)"/>

    <g transform="rotate(-19 160 150)">
      <ellipse cx="160" cy="150" rx="126" ry="73" stroke="url(#orbitFlowTrail)" stroke-width="2.4" opacity="0.42"/>
    </g>
    <g transform="rotate(-22 160 150)">
      <ellipse cx="160" cy="150" rx="128" ry="73.5" stroke="url(#orbitFlowTrail)" stroke-width="2.4" opacity="0.52"/>
    </g>
    <g transform="rotate(-25 160 150)">
      <ellipse cx="160" cy="150" rx="129" ry="74" stroke="url(#orbitFlowTrail)" stroke-width="2.5" opacity="0.62"/>
    </g>
    <g transform="rotate(-28 160 150)">
      <ellipse cx="160" cy="150" rx="130" ry="74" stroke="url(#orbitFlowTrail)" stroke-width="2.7" opacity="0.72"/>
    </g>
    <g transform="rotate(-31 160 150)">
      <ellipse cx="160" cy="150" rx="131" ry="74.5" stroke="url(#orbitFlowTrail)" stroke-width="2.5" opacity="0.62"/>
    </g>
    <g transform="rotate(-34 160 150)">
      <ellipse cx="160" cy="150" rx="132" ry="75" stroke="url(#orbitFlowTrail)" stroke-width="2.4" opacity="0.52"/>
    </g>
    <g transform="rotate(-37 160 150)">
      <ellipse cx="160" cy="150" rx="133" ry="75.5" stroke="url(#orbitFlowTrail)" stroke-width="2.3" opacity="0.42"/>
    </g>

    <g clip-path="url(#starTopTipClip)">
      <path d="M160 60L178 138L256 150L178 162L160 240L142 162L64 150L142 138L160 60Z" fill="var(--star-fill)" stroke="var(--star-stroke)" stroke-width="2.2"/>
    </g>

    <g transform="rotate(-28 160 150)">
      <circle cx="288" cy="151" r="10" fill="var(--satellite)"/>
    </g>
  </g>

  <g transform="translate(528 104)">
    <text x="0" y="116" fill="var(--wordmark)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="128" font-weight="800" letter-spacing="-4">ASTRA</text>
    <text x="6" y="184" fill="var(--submark)" font-family="JetBrains Mono, Consolas, monospace" font-size="34" font-weight="700" letter-spacing="12">TRADEBOT</text>
    <line x1="4" y1="214" x2="454" y2="214" stroke="url(#wordLine)" stroke-width="2" opacity="0.76"/>
  </g>
</svg>
