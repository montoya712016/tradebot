<!doctype html>
<html lang="pt-br" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Astra Tradebot — Login" }}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='astra_shared.css') }}?v=20260330b" />
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}?v=20260126a" />

    <style>
      .login-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      .login-card {
        width: min(100%, 460px);
      }

      .login-subtitle {
        color: rgba(255, 255, 255, 0.68);
      }

      .form-control,
      .form-control:focus {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.10);
        color: #f8fafc;
        box-shadow: none;
      }

      .form-control::placeholder {
        color: rgba(255, 255, 255, 0.40);
      }

      .login-label {
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 700;
      }

      .btn-login {
        background: linear-gradient(135deg, #7c5cff, #5a8cff);
        border: none;
        color: #fff;
        box-shadow: 0 10px 24px rgba(124, 92, 255, 0.28);
      }

      .btn-login:hover,
      .btn-login:focus {
        color: #fff;
        background: linear-gradient(135deg, #6f51ff, #4e7bff);
      }

      .btn-outline-soft {
        border-color: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.82);
      }

      .btn-outline-soft:hover,
      .btn-outline-soft:focus {
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        border-color: rgba(255, 255, 255, 0.20);
      }
    </style>
  </head>
  <body class="astra-body">
    <main class="login-shell">
      <section class="card card-glass login-card">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="brand-dot"></span>
            <span class="fw-semibold">Astra Tradebot</span>
            <span class="badge text-bg-secondary ms-1">{{ badge or "Dashboard" }}</span>
          </div>

          <div class="small text-uppercase text-secondary fw-semibold mb-2">{{ eyebrow or "Acesso protegido" }}</div>
          <h1 class="h2 fw-bold mb-2">{{ heading or "Entrar no dashboard" }}</h1>
          <p class="login-subtitle mb-4">{{ subtitle or "Use suas credenciais para acessar a interface." }}</p>

          {% if error %}
          <div class="alert alert-danger py-2 px-3 mb-3">{{ error }}</div>
          {% endif %}

          {% if success %}
          <div class="alert alert-success py-2 px-3 mb-3">{{ success }}</div>
          {% endif %}

          <form method="post" action="{{ url_for('login') }}" class="d-grid gap-3">
            <input type="hidden" name="next" value="{{ next_url or '/' }}" />

            <div>
              <label class="login-label mb-2" for="username">Usuário</label>
              <input
                id="username"
                name="username"
                class="form-control form-control-lg"
                autocomplete="username"
                placeholder="Seu usuário"
                value="{{ username or '' }}"
                required
              />
            </div>

            <div>
              <label class="login-label mb-2" for="password">Senha</label>
              <input
                id="password"
                name="password"
                type="password"
                class="form-control form-control-lg"
                autocomplete="current-password"
                placeholder="Sua senha"
                required
              />
            </div>

            <button type="submit" class="btn btn-login btn-lg mt-2">
              <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
          </form>

          <div class="d-flex align-items-center gap-2 my-4">
            <div class="flex-grow-1 border-top border-secondary-subtle"></div>
            <div class="small text-secondary">ou</div>
            <div class="flex-grow-1 border-top border-secondary-subtle"></div>
          </div>

          <div class="d-grid gap-2">
            <a href="{{ url_for('register', next=next_url or '/') }}" class="btn btn-outline-soft btn-lg">
              <i class="bi bi-person-plus me-2"></i>Criar conta
            </a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
